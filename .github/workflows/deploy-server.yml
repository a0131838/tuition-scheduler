name: Deploy Server

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Git branch to deploy
        required: true
        default: feat/strict-superadmin-availability-bypass

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: 43.128.46.115
      SSH_PORT: ${{ secrets.SERVER_SSH_PORT != '' && secrets.SERVER_SSH_PORT || '22' }}
      SSH_USER: ${{ secrets.SERVER_SSH_USER }}
      APP_DIR: ${{ secrets.SERVER_APP_DIR }}
      DEPLOY_ENV_FILE: ${{ secrets.SERVER_DEPLOY_ENV_FILE != '' && secrets.SERVER_DEPLOY_ENV_FILE || 'ops/server/.deploy.env' }}
      BRANCH: ${{ github.event.inputs.branch }}
    steps:
      - name: Validate inputs
        run: |
          case "$BRANCH" in
            feat/strict-superadmin-availability-bypass) ;;
            *) echo "Unsupported branch: $BRANCH"; exit 1 ;;
          esac

      - name: Prepare SSH key
        run: |
          test -n "${{ secrets.SERVER_SSH_PRIVATE_KEY }}" || { echo "Missing secret: SERVER_SSH_PRIVATE_KEY"; exit 1; }
          test -n "$SSH_USER" || { echo "Missing secret: SERVER_SSH_USER"; exit 1; }
          test -n "$APP_DIR" || { echo "Missing secret: SERVER_APP_DIR"; exit 1; }
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' '${{ secrets.SERVER_SSH_PRIVATE_KEY }}' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Add known hosts
        run: |
          ssh-keyscan -T 15 -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Run remote deploy
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" <<EOF
          set -euo pipefail
          cd "$APP_DIR"
          git fetch origin
          git checkout "$BRANCH"
          git reset --hard "origin/$BRANCH"
          bash ops/server/scripts/deploy_app.sh "$DEPLOY_ENV_FILE"
          EOF

      - name: Run remote health check
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" <<EOF
          set -euo pipefail
          pm2 status
          curl -I https://sgtmanage.com
          EOF
